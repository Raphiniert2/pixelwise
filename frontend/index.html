<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PixelWise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>PixelWise</h1>
    <p>Draw a digit, then click Classify.</p>
    <canvas id="pad" width="280" height="280"></canvas>
    <div class="controls">
        <button id="classify">Classify</button>
        <button id="clear">Clear</button>
    </div>
    <div id="result"></div>
    <div id="feedback" style="display:none;">
        <button id="confirm">✓ Richtig</button>
        <button id="wrong">✗ Falsch</button>
        <span id="correction-box" style="display:none;">
            <input id="correction-input" type="text" maxlength="1" placeholder="echte Ziffer">
            <button id="submit-correction">Senden</button>
        </span>
    </div>
    <h2>Recent predictions</h2>
    <ul id="history"></ul>
    <script src="app.js"></script>
</body>
</html>
